<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Platform</title>

    <!-- ===========================
         🔹 ملفات CSS
    =========================== -->
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="static/dashboard.css">
    <link rel="stylesheet" href="static/scene.css">
    <link rel="stylesheet" href="static/hud.css">
    <link rel="stylesheet" href="static/notifications.css">
    <link rel="stylesheet" href="static/buttons.css">
    <link rel="stylesheet" href="static/dream_engine.css">
    <link rel="stylesheet" href="static/dreams.css">
    <link rel="stylesheet" href="static/games.css">
    <link rel="stylesheet" href="static/matrix.css">
    <link rel="stylesheet" href="static/world.css">
    <link rel="stylesheet" href="static/wallet.css">
    <link rel="stylesheet" href="static/store.css">
    <link rel="stylesheet" href="static/social.css">
    <link rel="stylesheet" href="static/messages.css">
    <link rel="stylesheet" href="static/auth.css">
    <!-- <link rel="stylesheet" href="static/Theme.css"> --> <!-- موحد شامل -->

</head>
<body>
    <!-- ===========================
         🔹 حاوية اللعبة الرئيسية
    =========================== -->
    <div id="game-container"></div>

    <!-- ===========================
         🔹 واجهة المستخدم
    =========================== -->
    <div id="ui-layer">
        <div id="dashboard">
            <span>اللاعب: <span id="player-name">غير معرف</span></span>
            <span>الطاقة: <span id="player-energy">0</span></span>
            <span>المستوى: <span id="player-level">1</span></span>
        </div>

        <div class="notifications-container"></div>

        <div id="hud">
            <span>FPS: <span id="fps-counter">0</span></span>
        </div>

        <button id="voice-toggle">تشغيل الصوت</button>
    </div>

    <!-- ===========================
         🔹 شاشة التحميل
    =========================== -->
    <div id="loading-screen">جارٍ التحميل...</div>

    <!-- ===========================
         🔹 روابط ملفات JS
    =========================== -->
    <script src="static/helpers.js"></script>
    <script src="static/constants.js"></script>

    <script src="static/engine.js"></script>
    <script src="static/gltfLoader.js"></script>
    <script src="static/textureLoader.js"></script>

    <script src="static/avatar.js"></script>
    <script src="static/movement.js"></script>
    <script src="static/controls.js"></script>

    <script src="static/defaultWorld.js"></script>
    <script src="static/dreamWorld.js"></script>
    <script src="static/cityWorld.js"></script>

    <script src="static/main.js"></script>

    <!-- ===========================
         🔹 تهيئة عرض اللعبة
    =========================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game-container');
            const loadingScreen = document.getElementById('loading-screen');

            // مثال لتحميل عالم افتراضي وعرضه
            function initGame() {
                loadingScreen.style.display = 'none';
                // محرك اللعبة يبدأ هنا
                Engine.init(gameContainer); // افتراضياً توجد دالة init في engine.js
                DefaultWorld.load();       // تحميل العالم الافتراضي
            }

            // تبديل الصوت
            const voiceBtn = document.getElementById('voice-toggle');
            voiceBtn.addEventListener('click', () => {
                Voice.toggle(); // افتراضياً توجد دالة toggle في ملفات الصوت
            });

            // بدء اللعبة بعد تحميل الصفحة
            initGame();
        });
    </script>
</body>
</html>
